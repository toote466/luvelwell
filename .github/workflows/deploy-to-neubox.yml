name: Deploy to Neubox (SFTP)

on:
  push:
    branches: [ main ]

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SFTP (scp)
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT || '22' }}
          source: "./"
          target: ${{ secrets.SFTP_TARGET || '.' }}

      # Note: Create the following repository secrets in GitHub: SFTP_HOST, SFTP_USERNAME, SFTP_PASSWORD
      # Optional: SFTP_PORT, SFTP_TARGET
      # If Neubox no te indica una carpeta remota, usa "." para subir a tu home.
      # Si tu sitio se publica en public_html, guarda ese valor en SFTP_TARGET.
