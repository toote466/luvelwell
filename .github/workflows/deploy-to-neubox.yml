name: Deploy to Neubox (SFTP)

on:
  push:
    branches: [ main, master ]

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || '21' }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
          log-level: verbose

      # Note: Create the following repository secrets in GitHub: FTP_HOST, FTP_USERNAME, FTP_PASSWORD
      # Optional: FTP_PORT, FTP_SERVER_DIR
      # This workflow now forces plain FTP.
      # Use public_html/ in FTP_SERVER_DIR if your web root requires it, or ./ for the home folder.
