name: Deploy to Neubox (SFTP)

on:
  push:
    branches: [ main, master ]

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || '21' }}
          protocol: ftps
          security: loose
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}
          log-level: verbose

      # Note: Create the following repository secrets in GitHub: FTP_HOST, FTP_USERNAME, FTP_PASSWORD
      # Optional: FTP_PORT, FTP_SERVER_DIR
      # Neubox explicit FTPS on port 21 should work with protocol: ftps.
      # If your web root is under a specific folder, set FTP_SERVER_DIR accordingly.
      # Otherwise use ./ to deploy to your FTP home.
