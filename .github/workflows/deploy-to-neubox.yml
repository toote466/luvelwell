name: Deploy to Neubox (SFTP)

on:
  push:
    branches: [ main, master ]

jobs:
  sftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || '21' }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR || './' }}

      # Note: Create the following repository secrets in GitHub: FTP_HOST, FTP_USERNAME, FTP_PASSWORD
      # Optional: FTP_PORT, FTP_SERVER_DIR
      # Use the FTP host/port provided por Neubox, normalmente puerto 21.
      # Si Neubox usa public_html, ponlo en FTP_SERVER_DIR con valor "public_html/".
      # Si quieres subir a tu home, deja FTP_SERVER_DIR vacío o pon "./".
